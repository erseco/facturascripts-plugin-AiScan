---
services:
  mariadb:
    image: mariadb:lts
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=facturascripts
      - MYSQL_DATABASE=facturascripts
      - MYSQL_USER=facturascripts
      - MYSQL_PASSWORD=facturascripts
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  facturascripts:
    image: erseco/alpine-facturascripts:main
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Database Connection
      DB_HOST: mariadb
      DB_NAME: facturascripts
      DB_USER: facturascripts
      DB_PASSWORD: facturascripts
      # Initial Setup (unattended installation)
      FS_INITIAL_USER: admin
      FS_INITIAL_PASS: admin
      FS_LANG: es_ES
      FS_TIMEZONE: Europe/Madrid
      # Company setup (auto-completes Wizard) — Canarias / IGIC demo (matches blueprint.json)
      FS_CODPAIS: ESP
      FS_COMPANY_NAME: "Pepita Gómez - Autónoma"
      FS_COMPANY_CIF: "125478938W"
      FS_COMPANY_REGIMENIVA: General
      FS_COMPANY_TIPOIDFISCAL: NIF
      FS_COMPANY_ADDRESS: "Calle Castillo 15"
      FS_COMPANY_POSTAL: "38003"
      FS_COMPANY_CITY: "Santa Cruz de Tenerife"
      FS_COMPANY_PROVINCE: "Santa Cruz de Tenerife"
      FS_DEFAULT_TAX: IGIC7
      FS_LOAD_ACCOUNTING_PLAN: "true"
      # Seed data: load suppliers and products from blueprint.json
      FS_SEED_FILE: /var/www/html/Plugins/AiScan/blueprint.json
      # Debug mode (set to false in production)
      FS_DEBUG: "true"
      # Disable cron tasks in development
      RUN_CRON_TASKS: "false"
      # AI Provider API keys (optional, read from host environment)
      # Set these in your shell or .env file, never commit them
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      MISTRAL_API_KEY: "${MISTRAL_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      # Auto-setup: configure AiScan API keys from environment
      POST_CONFIGURE_COMMANDS: >-
        php84 /var/www/html/Plugins/AiScan/docker/setup-aiscan.php
    volumes:
      - facturascripts_data:/var/www/html/volume
      # Mount the plugin directory
      - ./:/var/www/html/Plugins/AiScan
    depends_on:
      mariadb:
        condition: service_healthy

volumes:
  mariadb_data:
  facturascripts_data:
